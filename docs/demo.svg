<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <!-- Terminal window -->
  <rect width="700" height="420" rx="10" fill="#0a0a0c"/>
  <rect width="700" height="32" rx="10" fill="#1a1b21"/>
  <rect y="22" width="700" height="10" fill="#1a1b21"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="6" fill="#febc2e"/>
  <circle cx="58" cy="16" r="6" fill="#28c840"/>
  <text x="350" y="20" text-anchor="middle" font-family="monospace" font-size="12" fill="#6b6e7a">DOOM — Terminal</text>

  <!-- Terminal content -->
  <text x="20" y="55" font-family="monospace" font-size="12" fill="#6b6e7a">$ ./start.sh</text>

  <text x="20" y="85" font-family="monospace" font-size="13" fill="#00e676" font-weight="bold">  ╔══════════════════════════════════════╗</text>
  <text x="20" y="103" font-family="monospace" font-size="13" fill="#00e676" font-weight="bold">  ║           DOOM AWAKENS               ║</text>
  <text x="20" y="121" font-family="monospace" font-size="13" fill="#00e676" font-weight="bold">  ╚══════════════════════════════════════╝</text>

  <text x="20" y="150" font-family="monospace" font-size="11" fill="#69f0ae">  Server:     PID 42001 → 0.0.0.0:5050</text>
  <text x="20" y="168" font-family="monospace" font-size="11" fill="#69f0ae">  Worker:     PID 42002</text>
  <text x="20" y="186" font-family="monospace" font-size="11" fill="#69f0ae">  Watchtower: PID 42003 (checks every 5m)</text>
  <text x="20" y="204" font-family="monospace" font-size="11" fill="#69f0ae">  Introspect: PID 42004 (self-improvement every 2h)</text>
  <text x="20" y="222" font-family="monospace" font-size="11" fill="#69f0ae">  Scheduler:  PID 42005 (cron decrees every 60s)</text>
  <text x="20" y="240" font-family="monospace" font-size="11" fill="#69f0ae">  HealthMon:  PID 42006 (health checks every 30s)</text>

  <text x="20" y="268" font-family="monospace" font-size="11" fill="#c8cad0">  Local:     http://localhost:5050/desktop</text>
  <text x="20" y="286" font-family="monospace" font-size="11" fill="#c8cad0">  Mobile:    http://100.x.x.x:5050/mobile</text>

  <text x="20" y="314" font-family="monospace" font-size="11" fill="#ffd740">  Session 1 opened.</text>
  <text x="20" y="332" font-family="monospace" font-size="11" fill="#00e676" font-weight="bold">  DOOM is operational.</text>

  <text x="20" y="365" font-family="monospace" font-size="12" fill="#6b6e7a">$ python dm.py decree create --title "Build data pipeline"</text>
  <text x="20" y="383" font-family="monospace" font-size="11" fill="#69f0ae">  Decree dc-f7a2 created [P2] — "Build data pipeline"</text>

  <text x="20" y="408" font-family="monospace" font-size="12" fill="#6b6e7a">$ <rect x="127" y="397" width="8" height="14" fill="#00e676" opacity="0.7"><animate attributeName="opacity" values="0.7;0;0.7" dur="1s" repeatCount="indefinite"/></rect></text>
</svg>
