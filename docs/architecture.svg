<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" rx="12" fill="#0a0a0c"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#00e676" font-weight="bold" letter-spacing="4">DOOM ARCHITECTURE</text>

  <!-- DOOM Sovereign -->
  <rect x="310" y="55" width="180" height="60" rx="6" fill="#131418" stroke="#00e676" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-family="monospace" font-size="16" fill="#00e676" font-weight="bold">DOOM</text>
  <text x="400" y="102" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6e7a">SOVEREIGN</text>

  <!-- Lines from DOOM to bots -->
  <line x1="340" y1="115" x2="150" y2="155" stroke="#2a2c36" stroke-width="1.5"/>
  <line x1="400" y1="115" x2="400" y2="155" stroke="#2a2c36" stroke-width="1.5"/>
  <line x1="460" y1="115" x2="650" y2="155" stroke="#2a2c36" stroke-width="1.5"/>

  <!-- Doom Bots -->
  <rect x="70" y="155" width="160" height="50" rx="4" fill="#131418" stroke="#00e676" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="150" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#69f0ae">DOOM BOT III</text>
  <text x="150" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6e7a">dc-a1b2: schema</text>

  <rect x="320" y="155" width="160" height="50" rx="4" fill="#131418" stroke="#00e676" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="400" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#69f0ae">DOOM BOT IV</text>
  <text x="400" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6e7a">dc-c3d4: backend</text>

  <rect x="570" y="155" width="160" height="50" rx="4" fill="#131418" stroke="#00e676" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="650" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#69f0ae">DOOM BOT V</text>
  <text x="650" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6e7a">dc-e5f6: frontend</text>

  <!-- Lines to memory -->
  <line x1="150" y1="205" x2="400" y2="260" stroke="#2a2c36" stroke-width="1"/>
  <line x1="400" y1="205" x2="400" y2="260" stroke="#2a2c36" stroke-width="1"/>
  <line x1="650" y1="205" x2="400" y2="260" stroke="#2a2c36" stroke-width="1"/>

  <!-- memory.db -->
  <rect x="300" y="260" width="200" height="50" rx="6" fill="#131418" stroke="#ffd740" stroke-width="1.5"/>
  <text x="400" y="283" text-anchor="middle" font-family="monospace" font-size="13" fill="#ffd740" font-weight="bold">memory.db</text>
  <text x="400" y="300" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b6e7a">decrees | archives | chronicle</text>

  <!-- Daemons row -->
  <text x="400" y="345" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6e7a" letter-spacing="2">DAEMONS</text>
  <line x1="100" y1="352" x2="700" y2="352" stroke="#2a2c36" stroke-width="0.5"/>

  <!-- Daemon boxes -->
  <rect x="30" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="85" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">server.py</text>
  <text x="85" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">:5050 War Room</text>

  <rect x="155" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="210" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">worker.py</text>
  <text x="210" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">decree executor</text>

  <rect x="280" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="335" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">watchtower.py</text>
  <text x="335" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">health + intel</text>

  <rect x="405" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="460" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">introspect.py</text>
  <text x="460" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">self-improve</text>

  <rect x="530" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="585" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">scheduler.py</text>
  <text x="585" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">cron decrees</text>

  <rect x="655" y="365" width="110" height="40" rx="3" fill="#131418" stroke="#2a2c36" stroke-width="1"/>
  <text x="710" y="382" text-anchor="middle" font-family="monospace" font-size="9" fill="#00e676">healthmon.py</text>
  <text x="710" y="396" text-anchor="middle" font-family="monospace" font-size="8" fill="#6b6e7a">auto-restart</text>

  <!-- War Room UI -->
  <text x="400" y="440" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b6e7a" letter-spacing="2">INTERFACES</text>
  <line x1="100" y1="447" x2="700" y2="447" stroke="#2a2c36" stroke-width="0.5"/>

  <rect x="120" y="460" width="160" height="30" rx="3" fill="#131418" stroke="#00e676" stroke-width="1"/>
  <text x="200" y="480" text-anchor="middle" font-family="monospace" font-size="10" fill="#00e676">War Room UI</text>

  <rect x="320" y="460" width="160" height="30" rx="3" fill="#131418" stroke="#ffd740" stroke-width="1"/>
  <text x="400" y="480" text-anchor="middle" font-family="monospace" font-size="10" fill="#ffd740">dm.py CLI</text>

  <rect x="520" y="460" width="160" height="30" rx="3" fill="#131418" stroke="#69f0ae" stroke-width="1"/>
  <text x="600" y="480" text-anchor="middle" font-family="monospace" font-size="10" fill="#69f0ae">War Council AI</text>
</svg>
